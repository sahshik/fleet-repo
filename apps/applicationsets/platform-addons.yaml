apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-addons
  namespace: argocd

spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster

  template:
    metadata:
      name: "{{name}}-addons"

    spec:
      project: default

      source:
        repoURL: https://github.com/sahshik/fleet-repo.git
        targetRevision: HEAD
        path: addons/base
        helm:
          valueFiles:
            - "../../addons/{{name}}/values.yaml"

      destination:
        server: "{{server}}"
        namespace: platform-addons

      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jqPathExpressions:
            - '.webhooks[].namespaceSelector.matchExpressions'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
