apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: hub-apps
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:sahshik/fleet-repo.git
    targetRevision: HEAD
    path: hub

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
